spring.application.name=studentmanager
server.port=8080

# SQL Server Configuration - Format theo schoolmanager
# Cách 1: SQL Server Express với instance name (thử format này trước)
spring.datasource.url=jdbc:sqlserver://localhost:1433;instanceName=SQLEXPRESS;encrypt=true;trustServerCertificate=true;databaseName=school1234
spring.datasource.username=sa
spring.datasource.password=123456

# Cách 2: Nếu cách trên không được, thử cách này (dùng backslash)
# spring.datasource.url=jdbc:sqlserver://localhost\\SQLEXPRESS:1433;encrypt=true;trustServerCertificate=true;databaseName=school1234
# spring.datasource.username=sa
# spring.datasource.password=123456

# Cách 3: Bỏ instance name (nếu không dùng Express)
# spring.datasource.url=jdbc:sqlserver://localhost:1433;encrypt=true;trustServerCertificate=true;databaseName=school1234
# spring.datasource.username=sa
# spring.datasource.password=123456

# Cách 4: Dùng tên máy tính (nếu biết tên máy)
# spring.datasource.url=jdbc:sqlserver://LÊQUANGLINH\\SQLEXPRESS:1433;encrypt=true;trustServerCertificate=true;databaseName=school1234
# spring.datasource.username=sa
# spring.datasource.password=123456

# JPA Configuration
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true
spring.jpa.database-platform=org.hibernate.dialect.SQLServerDialect

# Thymeleaf Configuration
spring.thymeleaf.cache=false
