<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${isEdit ? 'Sửa sinh viên' : 'Thêm sinh viên mới'}">Form sinh viên</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css" rel="stylesheet">
</head>
<body>
    <div class="container mt-4">
        <div class="row justify-content-center">
            <div class="col-md-8">
                <!-- Header -->
                <div class="d-flex justify-content-between align-items-center mb-4">
                    <h2 class="text-primary">
                        <i class="bi" th:classappend="${isEdit ? 'bi-pencil-square' : 'bi-person-plus'}"></i>
                        <span th:text="${isEdit ? 'Sửa sinh viên' : 'Thêm sinh viên mới'}"></span>
                    </h2>
                    <a href="/students" class="btn btn-outline-secondary">
                        <i class="bi bi-arrow-left"></i> Quay lại
                    </a>
                </div>

                <!-- Error Message -->
                <div th:if="${errorMessage}" class="alert alert-danger alert-dismissible fade show" role="alert">
                    <i class="bi bi-exclamation-triangle"></i> <span th:text="${errorMessage}"></span>
                    <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                </div>

                <!-- Form -->
                <div class="card">
                    <div class="card-header bg-primary text-white">
                        <h5 class="mb-0">
                            <i class="bi bi-file-text"></i> 
                            Thông tin sinh viên
                        </h5>
                    </div>
                    <div class="card-body">
                        <form th:action="${isEdit ? '/students/edit/' + student.id : '/students/add'}" 
                              th:object="${student}" 
                              method="post">
                            
                            <!-- ID Field (chỉ hiển thị khi sửa) -->
                            <div th:if="${isEdit}" class="mb-3">
                                <label for="id" class="form-label">ID</label>
                                <input type="text" class="form-control" id="id" 
                                       th:field="*{id}" readonly>
                                <small class="text-muted">ID không thể thay đổi</small>
                            </div>

                            <!-- Name Field -->
                            <div class="mb-3">
                                <label for="name" class="form-label">
                                    Họ tên <span class="text-danger">*</span>
                                </label>
                                <input type="text" class="form-control" id="name" 
                                       th:field="*{name}" 
                                       placeholder="Nhập họ tên sinh viên" 
                                       required>
                                <div class="invalid-feedback">
                                    Vui lòng nhập họ tên
                                </div>
                            </div>

                            <!-- Email Field -->
                            <div class="mb-3">
                                <label for="email" class="form-label">
                                    Email <span class="text-danger">*</span>
                                </label>
                                <input type="email" class="form-control" id="email" 
                                       th:field="*{email}" 
                                       placeholder="example@email.com" 
                                       required>
                                <div class="invalid-feedback">
                                    Vui lòng nhập email hợp lệ
                                </div>
                            </div>

                            <!-- Phone Field -->
                            <div class="mb-3">
                                <label for="sdt" class="form-label">Số điện thoại</label>
                                <input type="text" class="form-control" id="sdt" 
                                       th:field="*{sdt}" 
                                       placeholder="0912345678">
                            </div>

                            <!-- Buttons -->
                            <div class="d-grid gap-2 d-md-flex justify-content-md-end">
                                <a href="/students" class="btn btn-secondary me-md-2">
                                    <i class="bi bi-x-circle"></i> Hủy
                                </a>
                                <button type="submit" class="btn btn-primary">
                                    <i class="bi" th:classappend="${isEdit ? 'bi-check-circle' : 'bi-plus-circle'}"></i>
                                    <span th:text="${isEdit ? 'Cập nhật' : 'Thêm mới'}"></span>
                                </button>
                            </div>
                        </form>
                    </div>
                </div>

                <!-- Help Text -->
                <div class="card mt-3">
                    <div class="card-body">
                        <small class="text-muted">
                            <i class="bi bi-info-circle"></i> 
                            <strong>Lưu ý:</strong> Các trường có dấu <span class="text-danger">*</span> là bắt buộc.
                        </small>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        // Form validation
        (function() {
            'use strict';
            var forms = document.querySelectorAll('form');
            Array.prototype.slice.call(forms).forEach(function(form) {
                form.addEventListener('submit', function(event) {
                    if (!form.checkValidity()) {
                        event.preventDefault();
                        event.stopPropagation();
                    }
                    form.classList.add('was-validated');
                }, false);
            });
        })();
    </script>
</body>
</html>
